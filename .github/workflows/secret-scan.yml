name: secret-scan

# Block commits/PRs that contain secrets. Uses gitleaks CLI directly (MIT)
# rather than gitleaks/gitleaks-action@v2 which requires a paid license for
# organization repositories. Substitute for GitHub Advanced Security on
# private repos that don't have GHAS enabled.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so push events scan every commit, not just HEAD.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --source . --redact --verbose --no-banner --exit-code 1
