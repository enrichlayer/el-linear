name: secret-scan

# Block commits/PRs that contain secrets. Substitute for GitHub Advanced
# Security on private repos that don't have GHAS enabled.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action requires GITHUB_TOKEN; the GHAS license env var
          # below is intentionally unset so the action runs in pure scan mode.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
