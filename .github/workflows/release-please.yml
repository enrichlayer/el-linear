name: release-please

# On push to main, release-please scans conventional commits since the last
# release and opens (or updates) a "Release vX.Y.Z" PR with the version bump
# in package.json + the new CHANGELOG entry. Merging that PR tags vX.Y.Z,
# which then triggers the existing release.yml workflow to publish to npm.
#
# Safety: this workflow uses no untrusted inputs in run: blocks. The
# release-please action handles all PR-body / commit-message parsing
# internally with proper escaping.
#
# See docs/versioning.md for the policy.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
